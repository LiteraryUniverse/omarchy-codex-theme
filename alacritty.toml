# Literary Universe Dark — Alacritty
# Art Deco: deep charcoal, champagne gold, LU pink, sky blue

[colors.primary]
background = "#1B1A1A"
foreground = "#F0EDE8"
dim_foreground = "#8A8078"

[colors.cursor]
text = "#1B1A1A"
cursor = "#FF83D5"

[colors.vi_mode_cursor]
text = "#1B1A1A"
cursor = "#FF83D5"

[colors.search.matches]
foreground = "#1B1A1A"
background = "#D4A843"

[colors.search.focused_match]
foreground = "CellBackground"
background = "CellForeground"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#1B1A1A"
background = "#D4A843"

[colors.selection]
text = "CellBackground"
background = "CellForeground"

