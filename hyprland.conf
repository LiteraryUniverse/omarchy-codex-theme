# Codex — Hyprland
# Art Deco: sharp geometry, gold borders, LU pink accent
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(FF83D5ee) rgba(D4A843ee) 45deg

general {
    col.active_border = $activeBorderColor
    border_size = 2
    gaps_in = 4
    gaps_out = 3
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 4
    rounding_power = 2
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    }
    blur {
        enabled = true
        size = 2
        passes = 4
        contrast = 1.05
        brightness = 0.95
        vibrancy = 0.15
        vibrancy_darkness = 0.3
        noise = 0.02
        ignore_opacity = true
    }
}

# Crisp, geometric animations — Art Deco feel
animations {
    enabled = yes

    bezier = decoSnap,  0.00, 0.00, 0.20, 1.00
    bezier = decoFade,  0.20, 0.00, 0.20, 1.00

    animation = windows,          1, 2.2, decoSnap
    animation = windowsIn,        1, 2.0, decoSnap, slide
    animation = windowsOut,       1, 1.8, decoFade, slide
    animation = windowsMove,      1, 2.4, decoSnap

    animation = fade,             1, 2.0, decoFade
    animation = fadeIn,           1, 1.8, decoSnap
    animation = fadeOut,          1, 1.6, decoFade
    animation = fadeDim,          1, 1.6, decoFade

    animation = layers,           1, 2.0, decoSnap
    animation = layersIn,         1, 1.8, decoSnap, fade
    animation = layersOut,        1, 1.6, decoFade, fade

    animation = workspaces,       1, 2.2, decoSnap, slide
    animation = specialWorkspace, 1, 2.0, decoSnap, slidevert

    animation = border,           1, 2.4, decoSnap
    animation = borderangle,      1, 2.6, decoSnap
    animation = fadeSwitch,       1, 1.2, decoFade
}

